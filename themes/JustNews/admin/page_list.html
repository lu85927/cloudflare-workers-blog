<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>页面管理 - CF-blog后台</title>
    <link rel="icon" type="image/x-icon" href="https://cdn.jsdelivr.net/gh/gdtool/zhaopp/cfblog/favicon.ico" />
    <link rel="shortcut icon" type="image/x-icon" href="https://cdn.jsdelivr.net/gh/gdtool/zhaopp/cfblog/favicon.ico"/>
    <link rel="stylesheet" href="https://cdn.staticfile.org/twitter-bootstrap/3.3.7/css/bootstrap.min.css">
    <script src="https://cdn.staticfile.org/jquery/2.2.4/jquery.min.js"></script>
    <script src="https://cdn.staticfile.org/twitter-bootstrap/3.3.7/js/bootstrap.min.js"></script>
</head>
<body>
<nav class="navbar navbar-default">
    <div class="container-fluid">
        <ul class="nav nav-tabs">
            <li class="active"><a href="#">页面管理</a></li>
            <li><a href="/admin/">返回文章管理</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <h3>独立页面列表 <a href="/admin/pageEdit/" class="btn btn-success btn-sm">新建页面</a></h3>
    <table class="table table-striped table-hover">
        <thead>
            <tr>
                <th>Slug</th>
                <th>标题</th>
                <th>创建日期</th>
                <th>更新日期</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="pageTableBody">
            <tr><td colspan="5" class="text-center">加载中...</td></tr>
        </tbody>
    </table>
</div>

<script>
    function loadPageList() {
        $.get('/admin/pageList', function(data) {
            var tbody = $('#pageTableBody');
            tbody.empty();
            if (!data || data.length === 0) {
                tbody.append('<tr><td colspan="5" class="text-center">暂无页面</td></tr>');
                return;
            }
            for (var i = 0; i < data.length; i++) {
                var p = data[i];
                var row = '<tr>' +
                    '<td><code>' + p.slug + '</code></td>' +
                    '<td><a href="/p/' + p.slug + '" target="_blank">' + p.title + '</a></td>' +
                    '<td>' + p.createDate + '</td>' +
                    '<td>' + (p.updateDate || '') + '</td>' +
                    '<td>' +
                    '<a href="/admin/pageEdit/' + p.slug + '" class="btn btn-primary btn-xs">编辑</a> ' +
                    '<button class="btn btn-danger btn-xs" onclick="deletePage(\'' + p.slug + '\')">删除</button>' +
                    '</td>' +
                    '</tr>';
                tbody.append(row);
            }
        }).fail(function() {
            $('#pageTableBody').html('<tr><td colspan="5" class="text-danger">加载失败</td></tr>');
        });
    }

    function deletePage(slug) {
        if (!confirm('确定要删除页面 /p/' + slug + ' 吗？')) return;
        $.post('/admin/pageDelete/' + slug, function(result) {
            alert(result.msg);
            if (result.rst) loadPageList();
        });
    }

    $(function() {
        loadPageList();
    });
</script>
</body>
</html>
