<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>CF-blog后台</title>
    <link rel="icon" type="image/x-icon" href="https://cdn.jsdelivr.net/gh/gdtool/zhaopp/cfblog/favicon.ico" />
	<link rel="shortcut icon" type="image/x-icon"  href="https://cdn.jsdelivr.net/gh/gdtool/zhaopp/cfblog/favicon.ico"/>
    <link rel="stylesheet" href="https://cdn.staticfile.org/twitter-bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/editor.md@1.5.0/css/editormd.css" />
    <link rel="stylesheet" href="https://cdn.staticfile.org/bootstrap-select/1.9.4/css/bootstrap-select.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.14/dist/css/bootstrap-select.min.css">
    
    <script src="https://cdn.staticfile.org/jquery/2.2.4/jquery.min.js"></script>
    <script src="https://cdn.staticfile.org/twitter-bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.14/dist/js/bootstrap-select.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.14/dist/js/i18n/defaults-zh_CN.min.js"></script>
	<style>
		.bootstrap-select>.dropdown-toggle {
		z-index:auto;
		}
        .modal-body .editormd {
            z-index: 1050;
        }
	</style>
	
</head>
<body>

<nav class="navbar navbar-default " role="navigation">
	<div class="container-fluid">

	<div>
		<ul id="myTab" class="nav nav-tabs">
			<li>
				<a href="/" >CF-blog</a>
			</li>
			<li>
				<a href="#list" data-toggle="tab">我的文章</a>
			</li>
			<li  class="active">
				<a href="#new" data-toggle="tab">新建文章</a>
			</li>
            <!-- 新增单页管理Tab -->
            <li>
				<a href="#pageTab" data-toggle="tab">单页管理</a>
			</li>
			<li>
				<a href="#config" data-toggle="tab">设置</a>
			</li>
			<li>
				<a href="#pub" data-toggle="tab">发布</a>
			</li>
		</ul>
	</div>
	</div>
</nav>
<div id="myTabContent" class="tab-content" style="padding-top: 60px;">
	<div class="tab-pane fade" id="list">
		<div class="container" >
			<table class="table  table-striped" id="articleList">
				  <tr><td>ID</td><td>标题</td><td>创建日期</td></tr>
			</table>
			<input type="hidden"  name="page" id="page" value='1'>
			<a id="loadmore" class="btn btn-default">加载更多...</a>
		</div> 
	</div>
	<div class="tab-pane fade in active" id="new">
		<div class="container">
			<h3 id="labelNew">新增文章</h3>   
			<form id="addNewForm"  class="form-inline" >
				<div class="form-group" style="width: 98%">
					<input type="hidden" class="form-control" name="id" id="id" >
					<input type="text" class="form-control" name="title" id="title" placeholder="标题" style="width: 100%;" required="true">
				</div>
				<div class="form-group">
					<label for="exampleInputEmail2">特色图片</label>
					<input type="url" class="form-control" style="width: 400px;"  name="img" id="img" placeholder="" >
				</div>
				<div class="form-group">
					<label for="exampleInputEmail2">永久链接</label>
					<input type="text" class="form-control" name="link" id="link" placeholder="" required="true">
				</div>
				<div class="form-group">
					<label for="exampleInputEmail2">创建日期</label>
					<input type="datetime-local" class="form-control" id="createDate" name="createDate" placeholder=""  required="true">
				</div>
				<div class="form-group">
					<label for="exampleInputEmail2">分类</label>
					<select class="selectpicker" multiple name="category[]" id="category">
					</select>
				</div>
				<div class="form-group">
					<label for="exampleInputEmail2">标签</label>
					<input type="text" class="form-control" name="tags" id="tags" placeholder="标签1,标签2">
				</div>
				<div class="form-group">
					<label for="exampleInputEmail2">权重</label>
					<input type="text" class="form-control" name="priority" id="priority" value='0.5' placeholder="权重">
				</div>
				<div class="form-group">
					<label for="exampleInputEmail2">更新频率</label>
					    <select class="form-control" id="changefreq" name="changefreq">
						<option value="daily" selected  = "selected" >daily</option>
						<option value="hourly" >hourly</option>
						<option value="weekly" >weekly</option>
						<option value="monthly" >monthly</option>
						<option value="yearly" >yearly</option>
						<option value="never" >never</option>
						<option value="always" >always</option>
					    </select>
				</div>
					<a  tabindex="0"  role="button"  type="submit" id="btn_saveAddNew" class="btn btn-default" onclick="saveAddNew()">保存文章</a>
					
				<div id="content"><textarea style="display:none;"></textarea></div>
			</form>
		</div>
	</div>

    <!-- ========== 新增：单页管理面板 ========== -->
    <div class="tab-pane fade" id="pageTab">
        <div class="container">
            <div class="row" style="margin-bottom:15px;">
                <button class="btn btn-primary" data-toggle="modal" data-target="#pageModal">新建单页</button>
            </div>
            <table class="table table-striped" id="pageListTable">
                <tr>
                    <th>页面别名(link)</th>
                    <th>页面标题</th>
                    <th>更新日期</th>
                    <th>访问地址</th>
                    <th>操作</th>
                </tr>
            </table>
        </div>
    </div>

    <!-- 单页弹窗 新建/编辑共用 -->
    <div class="modal fade" id="pageModal" tabindex="-1" role="dialog" aria-labelledby="pageModalLabel">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                    <h4 class="modal-title" id="pageModalLabel">新建自定义单页</h4>
                </div>
                <div class="modal-body">
                    <form id="pageForm">
                        <input type="hidden" id="oldLink" name="oldLink">
                        <div class="form-group">
                            <label>页面别名(唯一，英文，如 about / links)</label>
                            <input class="form-control" id="pageLink" name="link" required>
                        </div>
                        <div class="form-group">
                            <label>页面标题</label>
                            <input class="form-control" id="pageTitle" name="title" required>
                        </div>
                        <div class="form-group">
                            <label>SEO关键词(逗号分隔)</label>
                            <input class="form-control" id="pageKeywords" name="keywords">
                        </div>
                        <div class="form-group">
                            <label>页面内容(Markdown)</label>
                            <div id="pageMdEditor">
                                <textarea style="display:none;" name="contentMD"></textarea>
                            </div>
                        </div>
                        <input type="hidden" id="pageHtml" name="contentHtml">
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
                    <button type="button" class="btn btn-primary" onclick="savePageData()">保存单页</button>
                </div>
            </div>
        </div>
    </div>
	
	<div class="tab-pane fade" id="config">
		
		<div class="container" >
			<form id="configForm" role="form" >
				<div class="form-group">
				    <label for="name">分类, 例:<code>["类别A","类别B","类别C","类别D"]</code></label>
					<textarea class="form-control" id="WidgetCategory" name="WidgetCategory" rows="3" placeholder='["分类A","分类B"]'></textarea>
				</div>
	
				<div class="form-group">
				    <label for="name">菜单, 例:<code>[{"title":"技术文章","url":"/category/技术文章"},{"title":"管理","url":"/admin"}]</code></label>
					<textarea class="form-control" id="WidgetMenu" name="WidgetMenu" rows="5"  placeholder='[
	{"title":"菜单A"	,"url":"/category/菜单A"},
	{"title":"菜单B"	,"url":"/category/菜单B"}
]'></textarea>
				</div>
				<div class="form-group">
				    <label for="name">其他链接, 例:<code>[{"title":"我的好友","url":"https://blog.gezhong.vip/"},{"title":"谷歌","url":"https://www.google.com/"}]</code></label>
					<textarea class="form-control" id="WidgetLink" name="WidgetLink" rows="5"  placeholder='[
	{"title":"好友"	,"url":"https://blog.gezhong.vip/"},
	{"title":"谷歌"	,"url":"https://www.google.com/"}
]'></textarea>
				</div>
				<a  tabindex="0"  role="button"  type="submit" id="btn_saveConfig" class="btn btn-default" onclick="saveConfig()">保存设置</a>
			</form>
			

			<form id="importForm" role="form" >
				<div class="form-group">
				    <label for="name">导出/导入</label>
					<textarea class="form-control" id="importJson" name="importJson" rows="3" placeholder='复制完整的导出json'></textarea>
				</div>

				<a  tabindex="0"  role="button"  type="submit" id="btn_import" class="btn btn-default" onclick="importBlog()">导入</a>
				<a  tabindex="0"  role="button"  type="submit" id="btn_export" class="btn btn-default"  href="/admin/export" >导出</a>
			</form>

			
		</div>
	</div>

	<div class="tab-pane fade" id="pub">
		<div class="container" >
			<div class="jumbotron" >
				<p class="lead">
				由于前端使用缓存,以下操作需要发布:新建文章、发布文章、修改后台配置、修改workers配置、新增/修改单页</br>
				前端生效需要ctrl+F5 强制刷新
				</p>
				
				<a href="#" class="btn btn-default" onclick="publishing()">发布</a>
			</div>
		</div>
	</div>	
</div>

<script src="https://cdn.jsdelivr.net/npm/editor.md@1.5.0/editormd.js"></script>   
<script type="text/javascript">
	$(function() {
		// 修复tab初始化错误
		$('#myTab li:first a').tab('show');
		//获取分类
		var categoryJson = <!--{categoryJson}-->;
		//获取菜单
		var menuJson = <!--{menuJson}-->;
		var linkJson = <!--{linkJson}-->;
        // 后端传入单页列表
        var pageJson = <!--{pageJson}-->;

		var mdEditor = editormd("content", {
			 height : 640,
			path   : "https://cdn.jsdelivr.net/npm/editor.md@1.5.0/lib/",
			appendMarkdown : "# MarkDown", 
			saveHTMLToTextarea : true,
			mode : "markdown",
			tex  : true,
			tocm : true, 
			codeFold : true
		});
        // 单页弹窗编辑器
        var pageEditor = editormd("pageMdEditor", {
            height: 400,
            path: "https://cdn.jsdelivr.net/npm/editor.md@1.5.0/lib/",
            appendMarkdown: "# 自定义页面内容",
            saveHTMLToTextarea: true,
            tex: true,
            tocm: true,
            codeFold: true
        });

		//表单赋值
		$('#createDate').val(new Date().toISOString().slice(0,16));
		
		$('#WidgetCategory').val(JSON.stringify(categoryJson));
		$('#WidgetMenu').val(JSON.stringify(menuJson));
		$('#WidgetLink').val(JSON.stringify(linkJson));
		var category = $('#category');
		category.empty();
		for (var i = 0; i < categoryJson.length; i++) {
			category.append('<option value="' + categoryJson[i] + '">' + categoryJson[i] + '</option>');
		}
		$("#loadmore").click();//初始加载一页

        // 渲染单页列表
        renderPageList(pageJson);

        // 弹窗关闭清空表单+清空编辑器
        $('#pageModal').on('hidden.bs.modal', function () {
            $('#pageForm')[0].reset();
            $('#oldLink').val("");
            $('#pageModalLabel').text("新建自定义单页");
            pageEditor.clear();
            pageEditor.setMarkdown("");
        });
	});

    // 渲染单页表格列表
    function renderPageList(list) {
        var html = "";
        if(!Array.isArray(list)) list = [];
        for(var i=0; i<list.length; i++){
            var item = list[i];
            var url = "/page/" + item.link + ".html";
            html += `<tr>
                <td>${item.link}</td>
                <td>${item.title}</td>
                <td>${item.updateDate}</td>
                <td><a target="_blank" href="${url}">${url}</a></td>
                <td>
                    <button class="btn btn-xs btn-info" onclick="editPage('${item.link}')">编辑</button>
                    <button class="btn btn-xs btn-danger" onclick="delPage('${item.link}')">删除</button>
                </td>
            </tr>`;
        }
        $("#pageListTable").find("tr:gt(0)").remove();
        $("#pageListTable").append(html);
    }

    // 编辑单页
    function editPage(link) {
        $.get("/admin/getPage/" + link, function(res){
            var data = res;
            $('#oldLink').val(data.link);
            $('#pageLink').val(data.link);
            $('#pageTitle').val(data.title);
            $('#pageKeywords').val(data.keywords);
            pageEditor.setMarkdown(data.contentMD);
            $('#pageModalLabel').text("编辑单页：" + data.title);
            $('#pageModal').modal('show');
        }).fail(function(){
            alert("获取页面数据失败");
        });
    }

    // 【核心修复】保存单页（新增/编辑）
    function savePageData() {
        // 手动读取所有字段，放弃serializeArray避免丢失编辑器数据
        let postData = {};
        postData.oldLink = $("#oldLink").val().trim();
        postData.link = $("#pageLink").val().trim();
        postData.title = $("#pageTitle").val().trim();
        postData.keywords = $("#pageKeywords").val().trim();
        postData.contentMD = pageEditor.getMarkdown();
        postData.contentHtml = pageEditor.getHTML();

        // 基础校验
        if(!postData.link){
            alert("请填写页面别名");
            return;
        }
        if(!postData.title){
            alert("请填写页面标题");
            return;
        }
        if(!postData.contentMD){
            alert("请填写页面内容");
            return;
        }

        // 修复1：去掉接口末尾多余斜杠，匹配worker路由
        let apiUrl = "";
        if(postData.oldLink === ""){
            apiUrl = "/admin/saveAddPage";
        }else{
            apiUrl = "/admin/saveEditPage";
        }

        console.log("提交数据：", postData); // F12控制台可打印调试
        $.ajax({
            type: "POST",
            url: apiUrl,
            contentType: "application/json; charset=utf-8",
            data: JSON.stringify(postData),
            dataType: "json",
            success: function(ret){
                alert(ret.msg);
                if(ret.rst){
                    $('#pageModal').modal('hide');
                    // 修复2：成功直接刷新页面，无需无效/api请求
                    location.reload();
                }
            },
            error: function(xhr){
                alert("请求失败："+xhr.status+"，检查worker脚本路由是否正常");
                console.error(xhr.responseText);
            }
        })
    }

    // 删除单页（改为POST规范请求）
    function delPage(link) {
        if(!confirm("确定删除页面 " + link + "？删除后无法恢复！")) return;
        $.ajax({
            type:"POST",
            url:"/admin/deletePage/"+link,
            dataType:"json",
            success:function(ret){
                alert(ret.msg);
                location.reload();
            },
            error:function(){
                alert("删除请求异常");
            }
        })
    }

    //加载文章列表	
    $("#loadmore").click(function(){
        var page=$("#page").val();
        $.ajax({
            url:"/admin/getList/" + page,
            type:'GET',
            dataType:"json",
            success:function(data){
                    tableContent="";
                    $.each(data,function(i){
                        var Info = data[i];
                        tableContent += '<tr><td>'+Info.id+'</td><td><a href="/admin/edit/'+Info.id+'">'+Info.title+'</a></td><td>'+Info.createDate.replace("T","")+'</td></tr>';
                    })
                    $("#articleList").append(tableContent);
                    $("#page").val(++page);
      
            }
        });
    })
    //新建文章
    function saveAddNew(){
        if( !$('#createDate').val() ){
           alert("请填写创建日期");
           return;
        }
        var postURL = "/admin/saveEdit";
        if ($('#id').val() == "")
            postURL=  "/admin/saveAddNew";
        $.ajax({
            type: "POST",
            dataType: "json",
            url: postURL,
			contentType: "application/json; charset=utf-8",
			data: JSON.stringify($("#addNewForm").serializeArray()), 
            success: function (result) {
                if ("id" in result){
                    $('#id').val(result.id);
					$('#labelNew').text("编辑:"+result.id);
                    alert(result.msg);
                }
                else 
                {
					alert("失败："+result.msg);
				}
            },
            error:function(){
                alert("保存文章请求异常");
            }
        });
    }
    //保存设置
    function saveConfig(){
        if(!isJSON($('#WidgetCategory').val()))
        {
            alert("分类格式错误"); 
            return false;
        }
        if(!isJSON($('#WidgetMenu').val()))
        {
            alert("菜单格式错误"); 
            return false;
        }
        $.ajax({
            type: "POST",
            dataType: "json",
			contentType: "application/json; charset=utf-8",
            url: "/admin/saveConfig",
			data: JSON.stringify($("#configForm").serializeArray()), 
            success: function (result) {
                alert(result.msg);
            },
            error:function(){
                alert("保存设置异常");
            }
        });
    }
    //导入json
    function importBlog(){
        if(!isJSON($('#importJson').val()))
        {
            alert("导入JSON格式错误"); 
            return false;
        }
        $.ajax({
            type: "POST",
            dataType: "json",
			contentType: "application/json; charset=utf-8",
            url: "/admin/import",
			data: JSON.stringify($("#importForm").serializeArray()), 
            success: function (result) {
                alert(result.msg);
                location.reload();
            },
            error:function(){
                alert("导入请求异常");
            }
        });
    }
    //发布缓存清理
    function publishing(){
        if (confirm("确定吗?发布将清理所有静态缓存,重新生成")==false){ 
            return false; 
          }
        $.ajax({
            type: "POST",
            dataType: "json",
			contentType: "application/json; charset=utf-8",
            url: "/admin/publish",
            success: function (result) {
                alert(result.msg);
            },
            error:function(){
                alert("发布接口异常");
            }
        });
    }
    function isJSON(str) {
        if (typeof str == 'string') {
            try {
                var obj=JSON.parse(str);
                return typeof obj == 'object' && obj != null;
            } catch(e) {
                return false;
            }
        }
        return false;
    }
</script>
 

</body>
</html>
